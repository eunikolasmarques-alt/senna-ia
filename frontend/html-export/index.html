<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>senna.ia - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zinc: {
                            800: '#27272a',
                            900: '#18181b',
                            950: '#09090b'
                        },
                        blue: {
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-zinc-950 text-zinc-100">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md">
            <!-- Logo -->
            <div class="text-center mb-8">
                <h1 class="text-5xl font-bold bg-gradient-to-r from-blue-600 to-cyan-600 bg-clip-text text-transparent mb-2">
                    senna.ia
                </h1>
                <p class="text-zinc-500 text-sm">Agência de Marketing Digital</p>
            </div>

            <!-- Card de Login -->
            <div class="bg-zinc-900/50 border border-zinc-800 rounded-lg p-6">
                <div class="mb-6">
                    <h2 class="text-2xl font-semibold text-white">Login</h2>
                    <p class="text-zinc-400 text-sm mt-1">Entre com suas credenciais</p>
                </div>

                <form action="dashboard.html" method="get" class="space-y-4">
                    <div>
                        <label for="email" class="block text-sm font-medium text-zinc-300 mb-1">Email</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email"
                            required
                            class="w-full px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-md text-zinc-100 placeholder-zinc-500 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
                            placeholder="seu@email.com"
                        >
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-zinc-300 mb-1">Senha</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            required
                            class="w-full px-3 py-2 bg-zinc-950 border border-zinc-800 rounded-md text-zinc-100 placeholder-zinc-500 focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
                            placeholder="********"
                        >
                    </div>

                    <button 
                        type="submit"
                        class="w-full py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-md transition-colors"
                    >
                        Entrar
                    </button>
                </form>

                <div class="mt-4 text-center">
                    <a href="#" class="text-sm text-blue-500 hover:text-blue-400 transition-colors">
                        Não tem uma conta? Cadastre-se
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
